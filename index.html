<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#000000">
<title>InvisPose</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@700;900&display=swap');

:root {
–g: #00ffc8;
–b: #00b8ff;
–r: #ff3d5a;
–y: #ffd166;
–hud: rgba(0,8,14,0.78);
–bd: rgba(0,255,200,0.22);
–mono: ‘Share Tech Mono’, monospace;
–head: ‘Orbitron’, sans-serif;
}

- { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body {
width: 100%; height: 100%;
overflow: hidden;
background: #000;
position: fixed;
touch-action: none;
}

/* ─── VIDEO + CANVAS ─── */
#vid {
position: fixed; inset: 0;
width: 100%; height: 100%;
object-fit: cover;
z-index: 0;
display: block;
}

#cv {
position: fixed; inset: 0;
width: 100%; height: 100%;
z-index: 2;
pointer-events: none;
display: block;
}

/* ─── SCANLINE ─── */
.scan {
position: fixed; left: 0; right: 0; height: 2px;
background: linear-gradient(90deg,transparent,var(–b) 25%,var(–g) 50%,var(–b) 75%,transparent);
opacity: 0; z-index: 3; pointer-events: none;
animation: scanAnim 3s linear infinite;
}
@keyframes scanAnim {
0%   { top: 0%;   opacity: 0; }
3%   { opacity: .3; }
97%  { opacity: .3; }
100% { top: 100%; opacity: 0; }
}

/* ─── CORNER MARKS ─── */
.cm { position: fixed; width: 18px; height: 18px; z-index: 4; pointer-events: none; }
.cm::before, .cm::after { content:’’; position: absolute; background: var(–g); opacity: .6; }
.tl { top: calc(env(safe-area-inset-top,0px) + 52px); left: 10px; }
.tl::before { width: 2px; height: 100%; top:0; left:0; }
.tl::after  { width: 100%; height: 2px; top:0; left:0; }
.tr { top: calc(env(safe-area-inset-top,0px) + 52px); right: 10px; }
.tr::before { width: 2px; height: 100%; top:0; right:0; }
.tr::after  { width: 100%; height: 2px; top:0; right:0; }
.bl { bottom: calc(env(safe-area-inset-bottom,0px) + 80px); left: 10px; }
.bl::before { width: 2px; height: 100%; bottom:0; left:0; }
.bl::after  { width: 100%; height: 2px; bottom:0; left:0; }
.br2 { bottom: calc(env(safe-area-inset-bottom,0px) + 80px); right: 10px; }
.br2::before { width: 2px; height: 100%; bottom:0; right:0; }
.br2::after  { width: 100%; height: 2px; bottom:0; right:0; }

/* ─── TOP BAR ─── */
.top {
position: fixed; top: 0; left: 0; right: 0; z-index: 10;
padding: calc(env(safe-area-inset-top,8px) + 8px) 12px 8px;
background: linear-gradient(to bottom,rgba(0,0,0,.8) 0%,transparent 100%);
display: flex; align-items: center; justify-content: space-between; gap: 8px;
}

.logo { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.logo-dot {
width: 24px; height: 24px; border-radius: 50%;
border: 1.5px solid var(–g);
box-shadow: 0 0 10px rgba(0,255,200,.4);
position: relative; flex-shrink: 0;
display: flex; align-items: center; justify-content: center;
}
.logo-dot::after {
content: ‘’;
width: 8px; height: 8px; border-radius: 50%;
background: var(–g);
animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{opacity:.4;transform:scale(.8)} 50%{opacity:1;transform:scale(1.1)} }

.logo-name {
font-family: var(–head); font-size: 13px; font-weight: 700;
letter-spacing: 3px; color: var(–g);
text-shadow: 0 0 12px rgba(0,255,200,.5);
}

.pills { display: flex; gap: 5px; align-items: center; flex-wrap: wrap; justify-content: flex-end; }

.pill {
display: flex; align-items: center; gap: 4px;
padding: 3px 7px;
background: var(–hud);
border: 1px solid var(–bd);
font-family: var(–mono); font-size: 10px;
backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
white-space: nowrap;
}
.pv { color: var(–g); }
.pd { color: rgba(0,255,200,.4); }
.blink {
width: 5px; height: 5px; border-radius: 50%;
background: var(–g); box-shadow: 0 0 5px var(–g);
animation: blink 1.4s ease-in-out infinite; flex-shrink: 0;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.1} }

/* ─── LEFT HUD ─── */
.lhud {
position: fixed; left: 10px; top: 50%; transform: translateY(-50%);
z-index: 10; display: flex; flex-direction: column; gap: 5px;
pointer-events: none;
}

/* ─── RIGHT HUD ─── */
.rhud {
position: fixed; right: 10px; top: 50%; transform: translateY(-50%);
z-index: 10; display: flex; flex-direction: column; gap: 5px;
pointer-events: none;
}

.hblock {
background: var(–hud);
border: 1px solid var(–bd);
padding: 5px 7px;
backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
}
.hl { font-family: var(–mono); font-size: 7px; color: rgba(0,255,200,.35); letter-spacing: 1px; }
.hv { font-family: var(–mono); font-size: 11px; color: var(–b); margin-top: 1px; }
.hbig {
font-family: var(–head); font-size: 20px; font-weight: 700;
color: var(–g); text-shadow: 0 0 10px rgba(0,255,200,.4); line-height: 1.1;
}
.hunit { font-family: var(–mono); font-size: 7px; color: rgba(0,255,200,.35); }

.sigbars { display: flex; align-items: flex-end; gap: 2px; height: 12px; margin-top: 2px; }
.sb {
width: 4px; border-radius: 1px;
background: rgba(0,255,200,.1); transition: background .4s;
}
.sb.on { background: var(–g); box-shadow: 0 0 3px var(–g); }
.sb:nth-child(1){height:3px} .sb:nth-child(2){height:6px}
.sb:nth-child(3){height:9px} .sb:nth-child(4){height:12px}

/* ─── BOTTOM BAR ─── */
.bot {
position: fixed; bottom: 0; left: 0; right: 0; z-index: 10;
padding: 8px 16px calc(env(safe-area-inset-bottom,8px) + 8px);
background: linear-gradient(to top,rgba(0,0,0,.85) 0%,transparent 100%);
display: flex; align-items: center; justify-content: space-between; gap: 10px;
}

.btn {
background: var(–hud); border: 1px solid var(–bd);
padding: 9px 13px; color: var(–g);
font-family: var(–mono); font-size: 10px; letter-spacing: 1px;
cursor: pointer; touch-action: manipulation;
backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
transition: background .15s;
user-select: none; -webkit-user-select: none;
display: flex; align-items: center; gap: 5px;
white-space: nowrap;
}
.btn:active { background: rgba(0,255,200,.18); }
.btn-icon { font-size: 14px; line-height: 1; }

.ctr { text-align: center; flex: 1; pointer-events: none; }
.big-n {
font-family: var(–head); font-size: 34px; font-weight: 900;
color: var(–g); text-shadow: 0 0 20px rgba(0,255,200,.5); line-height: 1;
}
.big-l {
font-family: var(–mono); font-size: 8px;
color: rgba(0,255,200,.4); letter-spacing: 2px; margin-top: 2px;
}

/* ─── SPLASH / LOADING ─── */
#splash {
position: fixed; inset: 0; z-index: 100;
background: #000;
display: flex; flex-direction: column;
align-items: center; justify-content: center; gap: 18px;
transition: opacity .5s ease;
}
#splash.gone { opacity: 0; pointer-events: none; }

.sp-logo {
font-family: var(–head); font-size: 26px; font-weight: 900;
letter-spacing: 6px; color: var(–g);
text-shadow: 0 0 30px rgba(0,255,200,.4);
}
.sp-sub { font-family: var(–mono); font-size: 10px; color: rgba(0,255,200,.3); letter-spacing: 3px; }
.sp-bar-wrap { width: 200px; height: 2px; background: rgba(0,255,200,.1); }
.sp-bar {
height: 100%; width: 0%;
background: linear-gradient(90deg, var(–b), var(–g));
box-shadow: 0 0 8px var(–g);
transition: width .35s ease;
}
.sp-msg { font-family: var(–mono); font-size: 10px; color: rgba(200,240,255,.4); letter-spacing: 1px; text-align: center; }
.sp-btn {
display: none;
background: transparent; border: 1px solid var(–g);
padding: 12px 32px; color: var(–g);
font-family: var(–head); font-size: 11px; letter-spacing: 3px;
cursor: pointer; touch-action: manipulation;
box-shadow: 0 0 16px rgba(0,255,200,.12);
}
.sp-btn:active { background: rgba(0,255,200,.1); }

/* ─── ERROR SCREEN ─── */
#errScreen {
display: none; position: fixed; inset: 0; z-index: 200;
background: rgba(0,0,0,.95);
flex-direction: column; align-items: center; justify-content: center; gap: 16px;
font-family: var(–mono); font-size: 12px; color: rgba(255,61,90,.7);
text-align: center; padding: 24px; line-height: 2;
}
#errScreen.show { display: flex; }

#errMsg { color: rgba(200,240,255,.5); font-size: 11px; }
.err-retry {
margin-top: 8px;
background: transparent; border: 1px solid var(–r);
padding: 10px 24px; color: var(–r);
font-family: var(–mono); font-size: 11px; letter-spacing: 1px;
cursor: pointer; touch-action: manipulation;
}
</style>

</head>
<body>

<!-- ── SPLASH ── -->

<div id="splash">
  <div class="sp-logo">INVISPOSE</div>
  <div class="sp-sub">POSE · DETECTION · AR</div>
  <div class="sp-bar-wrap"><div class="sp-bar" id="spBar"></div></div>
  <div class="sp-msg" id="spMsg">LOADING AI ENGINE…</div>
  <button class="sp-btn" id="spBtn" onclick="beginSession()">START CAMERA</button>
</div>

<!-- ── ERROR ── -->

<div id="errScreen">
  <div>⚠ CAMERA ERROR</div>
  <div id="errMsg"></div>
  <button class="err-retry" onclick="location.reload()">RETRY</button>
</div>

<!-- ── CAMERA ── -->

<video id="vid" autoplay playsinline muted></video>

<!-- ── CANVAS ── -->

<canvas id="cv"></canvas>

<!-- ── DECORATIONS ── -->

<div class="scan"></div>
<div class="cm tl"></div><div class="cm tr"></div>
<div class="cm bl"></div><div class="cm br2"></div>

<!-- ── TOP HUD ── -->

<div class="top">
  <div class="logo">
    <div class="logo-dot"></div>
    <div class="logo-name">INVISPOSE</div>
  </div>
  <div class="pills">
    <div class="pill"><div class="blink"></div><span class="pv" id="hFps">--</span><span class="pd">FPS</span></div>
    <div class="pill"><span class="pv" id="hConf">--</span><span class="pd">CONF</span></div>
    <div class="pill"><span class="pv" id="hNet">WIFI</span></div>
  </div>
</div>

<!-- ── LEFT HUD ── -->

<div class="lhud">
  <div class="hblock">
    <div class="hl">SIGNAL</div>
    <div class="sigbars" id="sigbars">
      <div class="sb on"></div><div class="sb on"></div>
      <div class="sb on"></div><div class="sb"></div>
    </div>
  </div>
  <div class="hblock">
    <div class="hl">DOWNLINK</div>
    <div class="hv" id="hDl">—</div>
  </div>
  <div class="hblock">
    <div class="hl">RTT</div>
    <div class="hv" id="hRtt">—</div>
  </div>
  <div class="hblock">
    <div class="hl">CAM</div>
    <div class="hv" id="hCam">REAR</div>
  </div>
</div>

<!-- ── RIGHT HUD ── -->

<div class="rhud">
  <div class="hblock" style="text-align:right">
    <div class="hl">PERSONS</div>
    <div class="hbig" id="hPersn">0</div>
  </div>
  <div class="hblock" style="text-align:right">
    <div class="hl">KEYPTS</div>
    <div class="hbig" id="hKp">0</div>
  </div>
  <div class="hblock" style="text-align:right">
    <div class="hl">LATENCY</div>
    <div class="hbig" id="hLat">--</div>
    <div class="hunit">ms</div>
  </div>
</div>

<!-- ── BOTTOM BAR ── -->

<div class="bot">
  <button class="btn" id="flipBtn" onclick="flipCam()">
    <span class="btn-icon">🔄</span><span>FLIP</span>
  </button>
  <div class="ctr">
    <div class="big-n" id="bigCount">0</div>
    <div class="big-l">DETECTED</div>
  </div>
  <button class="btn" id="fxBtn" onclick="toggleFx()">
    <span class="btn-icon">✦</span><span id="fxLbl">FX ON</span>
  </button>
</div>

<!-- TF.js + MoveNet -->

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-core@4.17.0/dist/tf-core.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-webgl@4.17.0/dist/tf-backend-webgl.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection@2.1.3/dist/pose-detection.min.js"></script>

<script>
'use strict';

// ── CONSTANTS ──
const KEYPOINT_NAMES = [
  'nose','left_eye','right_eye','left_ear','right_ear',
  'left_shoulder','right_shoulder','left_elbow','right_elbow',
  'left_wrist','right_wrist','left_hip','right_hip',
  'left_knee','right_knee','left_ankle','right_ankle'
];

const EDGES = [
  [0,1],[0,2],[1,3],[2,4],               // face
  [5,6],[5,7],[7,9],[6,8],[8,10],        // arms
  [5,11],[6,12],[11,12],                 // torso
  [11,13],[13,15],[12,14],[14,16]        // legs
];

const EDGE_COLORS = [
  '#00ffc8','#00ffc8','#00ffc8','#00ffc8',          // face
  '#ffd166','#00b8ff','#00b8ff','#00b8ff','#00b8ff', // arms
  '#ffd166','#ffd166','#ffd166',                     // torso
  '#ff6ec4','#ff6ec4','#ff6ec4','#ff6ec4'            // legs
];

// ── STATE ──
const vid  = document.getElementById('vid');
const cv   = document.getElementById('cv');
const ctx  = cv.getContext('2d');

let detector   = null;
let facingMode = 'environment';
let stream     = null;
let fxOn       = true;
let running    = false;
let afId       = null;

let frameCount = 0, lastFpsTime = 0, currentFps = 0;
let frameTs    = 0;

// ── RESIZE ──
function resize() {
  cv.width  = window.innerWidth;
  cv.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);
window.addEventListener('orientationchange', () => setTimeout(resize, 150));

// ── BOOT SEQUENCE ──
const bootSteps = [
  [0,  'LOADING AI ENGINE…'],
  [30, 'INITIALIZING WEBGL…'],
  [55, 'LOADING MOVENET MODEL…'],
  [80, 'WARMING UP…'],
  [100,'READY']
];

function setProgress(pct, msg) {
  document.getElementById('spBar').style.width = pct + '%';
  document.getElementById('spMsg').textContent  = msg;
}

async function boot() {
  try {
    setProgress(0,  'LOADING AI ENGINE…');
    await new Promise(r => setTimeout(r, 200));

    setProgress(30, 'INITIALIZING WEBGL…');
    await tf.setBackend('webgl');
    await tf.ready();

    setProgress(55, 'LOADING MOVENET MODEL…');
    detector = await poseDetection.createDetector(
      poseDetection.SupportedModels.MoveNet,
      {
        modelType: poseDetection.movenet.modelType.SINGLEPOSE_LIGHTNING,
        enableSmoothing: true,
      }
    );

    setProgress(80, 'WARMING UP…');
    await new Promise(r => setTimeout(r, 300));

    setProgress(100, 'READY · TAP TO BEGIN');
    document.getElementById('spBtn').style.display = 'block';

  } catch(e) {
    setProgress(0, 'ERROR: ' + e.message);
    console.error('Boot failed:', e);
  }
}

// ── CAMERA ──
async function beginSession() {
  document.getElementById('spBtn').style.display = 'none';
  setProgress(100, 'OPENING CAMERA…');
  await openCamera();
}

async function openCamera() {
  // Stop any existing stream
  if (stream) {
    stream.getTracks().forEach(t => t.stop());
    stream = null;
  }
  if (afId) { cancelAnimationFrame(afId); afId = null; }
  running = false;

  // Constraints: prefer environment (rear) or user (front)
  const constraints = {
    audio: false,
    video: {
      facingMode: { ideal: facingMode },
      width:  { ideal: 1280, min: 640 },
      height: { ideal: 720,  min: 480 },
      frameRate: { ideal: 30, min: 15 }
    }
  };

  try {
    stream = await navigator.mediaDevices.getUserMedia(constraints);
  } catch(e) {
    // Fallback: try without facingMode constraint
    try {
      stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
    } catch(e2) {
      showError('Camera denied or unavailable.<br>' + e2.message + '<br><br>Make sure you are on HTTPS and allowed camera access.');
      return;
    }
  }

  vid.srcObject = stream;
  vid.muted = true;
  vid.playsInline = true;

  // Wait for video to be ready
  await new Promise((resolve, reject) => {
    vid.onloadedmetadata = () => {
      vid.play().then(resolve).catch(reject);
    };
    vid.onerror = reject;
    setTimeout(reject, 8000); // 8s timeout
  }).catch(e => { showError('Video start failed: ' + e.message); return; });

  if (!vid.videoWidth) {
    // Give it another moment
    await new Promise(r => setTimeout(r, 500));
  }

  // Update cam label
  const track = stream.getVideoTracks()[0];
  const settings = track ? track.getSettings() : {};
  const isActuallyFront = (settings.facingMode === 'user') || (facingMode === 'user');
  document.getElementById('hCam').textContent = isActuallyFront ? 'FRONT' : 'REAR';

  // Hide splash
  const splash = document.getElementById('splash');
  splash.classList.add('gone');
  setTimeout(() => { splash.style.display = 'none'; }, 500);

  // Start detection loop
  running = true;
  lastFpsTime = performance.now();
  detectLoop();
}

async function flipCam() {
  facingMode = facingMode === 'environment' ? 'user' : 'environment';
  document.getElementById('hCam').textContent = '…';
  document.getElementById('flipBtn').disabled = true;
  await openCamera();
  document.getElementById('flipBtn').disabled = false;
}

// ── DETECTION LOOP ──
async function detectLoop() {
  if (!running) return;

  frameTs = performance.now();

  let poses = [];
  try {
    if (detector && vid.readyState >= 2 && vid.videoWidth > 0) {
      poses = await detector.estimatePoses(vid, {
        maxPoses: 5,
        flipHorizontal: false,    // we handle mirroring in canvas draw
        scoreThreshold: 0.3
      });
    }
  } catch(e) {
    // Transient error — just skip frame
    console.warn('Detect error:', e);
  }

  const latency = Math.round(performance.now() - frameTs);

  // FPS
  frameCount++;
  const now = performance.now();
  if (now - lastFpsTime >= 1000) {
    currentFps = Math.round(frameCount * 1000 / (now - lastFpsTime));
    frameCount = 0;
    lastFpsTime = now;
  }

  draw(poses, latency);

  afId = requestAnimationFrame(detectLoop);
}

// ── DRAW ──
function draw(poses, latency) {
  const W = cv.width, H = cv.height;
  const isFront = facingMode === 'user';
  
  ctx.clearRect(0, 0, W, H);

  // Vignette FX
  if (fxOn) {
    const vig = ctx.createRadialGradient(W/2,H/2,H*.22,W/2,H/2,H*.82);
    vig.addColorStop(0, 'transparent');
    vig.addColorStop(1, 'rgba(0,3,8,.5)');
    ctx.fillStyle = vig;
    ctx.fillRect(0, 0, W, H);
  }

  if (!poses || poses.length === 0) {
    // Searching pulse
    if (fxOn) {
      const cx = W/2, cy = H/2;
      const t  = (performance.now() / 600) % (Math.PI * 2);
      for (let i = 0; i < 3; i++) {
        const r = 28 + i*24 + Math.sin(t + i*1.2)*7;
        ctx.beginPath();
        ctx.arc(cx, cy, r, 0, Math.PI*2);
        ctx.strokeStyle = `rgba(0,255,200,${.07 - i*.02})`;
        ctx.lineWidth = 1.5;
        ctx.stroke();
      }
    }
    updateHud(0, 0, '--', latency);
    return;
  }

  let totalVis = 0, confSum = 0, confN = 0;

  for (let pi = 0; pi < poses.length; pi++) {
    const kps = poses[pi].keypoints;
    if (!kps || kps.length === 0) continue;

    // Mirror x for front camera
    const mx = (x) => isFront ? (W - x) : x;

    // Count visible keypoints
    let visKp = 0, localConf = 0;
    for (const kp of kps) {
      if ((kp.score || 0) >= 0.3) { visKp++; localConf += (kp.score || 0); confN++; confSum += (kp.score||0); }
    }
    if (visKp < 3) continue;
    totalVis += visKp;

    // ── Draw skeleton edges ──
    ctx.lineCap = 'round';
    for (let ei = 0; ei < EDGES.length; ei++) {
      const [a, b] = EDGES[ei];
      const ka = kps[a], kb = kps[b];
      if (!ka || !kb) continue;
      if ((ka.score||0) < 0.3 || (kb.score||0) < 0.3) continue;

      const ax = mx(ka.x), ay = ka.y;
      const bx = mx(kb.x), by = kb.y;
      const col = EDGE_COLORS[ei];
      const vis = ((ka.score||0) + (kb.score||0)) / 2;

      // Glow pass
      if (fxOn) {
        ctx.beginPath(); ctx.moveTo(ax, ay); ctx.lineTo(bx, by);
        ctx.strokeStyle = col + '2a';
        ctx.lineWidth = 12;
        ctx.stroke();
      }

      // Main line
      ctx.beginPath(); ctx.moveTo(ax, ay); ctx.lineTo(bx, by);
      ctx.strokeStyle = col + Math.round(vis * 220).toString(16).padStart(2,'0');
      ctx.lineWidth = 3;
      ctx.stroke();
    }

    // ── Draw keypoints ──
    for (const kp of kps) {
      if ((kp.score||0) < 0.3) continue;
      const px = mx(kp.x), py = kp.y;
      const col = kpColor(kp.name || '');
      const r = (kp.name || '').includes('eye') || (kp.name || '').includes('ear') ? 3 : 5;

      if (fxOn) {
        ctx.beginPath(); ctx.arc(px, py, r + 5, 0, Math.PI*2);
        ctx.fillStyle = col + '20'; ctx.fill();
      }
      ctx.beginPath(); ctx.arc(px, py, r, 0, Math.PI*2);
      ctx.fillStyle = col;
      if (fxOn) { ctx.shadowColor = col; ctx.shadowBlur = 8; }
      ctx.fill();
      ctx.shadowBlur = 0;
    }

    // ── Bounding box + label ──
    const visKps = kps.filter(k => (k.score||0) >= 0.3);
    if (visKps.length >= 4) {
      const xs = visKps.map(k => mx(k.x));
      const ys = visKps.map(k => k.y);
      const x1 = Math.min(...xs) - 12, y1 = Math.min(...ys) - 16;
      const x2 = Math.max(...xs) + 12, y2 = Math.max(...ys) + 12;
      const bw = x2 - x1, bh = y2 - y1;

      ctx.strokeStyle = 'rgba(0,255,200,.15)';
      ctx.lineWidth = 1;
      ctx.setLineDash([5,4]);
      ctx.strokeRect(x1, y1, bw, bh);
      ctx.setLineDash([]);

      // Label at top of box
      const conf = Math.round((localConf / visKp) * 100);
      const label = `PERSON ${pi + 1} · ${conf}%`;
      const lw = ctx.measureText(label).width;
      const lx = x1 + bw/2, ly = y1 - 4;

      ctx.fillStyle = 'rgba(0,8,14,.8)';
      ctx.fillRect(lx - lw/2 - 6, ly - 15, lw + 12, 15);
      ctx.strokeStyle = 'rgba(0,255,200,.5)';
      ctx.lineWidth = .7;
      ctx.strokeRect(lx - lw/2 - 6, ly - 15, lw + 12, 15);

      ctx.fillStyle = '#00ffc8';
      ctx.font = '10px "Share Tech Mono"';
      ctx.textAlign = 'center';
      ctx.fillText(label, lx, ly - 4);
      ctx.textAlign = 'left';
    }
  }

  const avgConf = confN > 0 ? Math.round(confSum / confN * 100) + '%' : '--';
  updateHud(poses.length, totalVis, avgConf, latency);
}

function kpColor(name) {
  if (name.includes('eye') || name.includes('ear') || name === 'nose') return '#00ffc8';
  if (name.includes('shoulder') || name.includes('hip'))               return '#ffd166';
  if (name.includes('elbow') || name.includes('wrist'))                return '#00b8ff';
  return '#ff6ec4';
}

function updateHud(persons, kps, conf, latency) {
  document.getElementById('hFps').textContent    = currentFps || '--';
  document.getElementById('hConf').textContent   = conf;
  document.getElementById('hPersn').textContent  = persons;
  document.getElementById('hKp').textContent     = kps;
  document.getElementById('hLat').textContent    = latency;
  document.getElementById('bigCount').textContent = persons;
}

// ── FX TOGGLE ──
function toggleFx() {
  fxOn = !fxOn;
  document.getElementById('fxLbl').textContent = fxOn ? 'FX ON' : 'FX OFF';
}

// ── NETWORK INFO ──
function readNet() {
  const c = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
  if (!c) return;
  const type = (c.effectiveType || c.type || 'wifi').toUpperCase();
  document.getElementById('hNet').textContent = type;
  if (c.downlink) {
    document.getElementById('hDl').textContent = c.downlink.toFixed(1) + ' Mb';
    const lv = Math.min(4, Math.ceil(c.downlink / 15));
    document.querySelectorAll('.sb').forEach((b,i) => b.classList.toggle('on', i < lv));
  }
  if (c.rtt != null) document.getElementById('hRtt').textContent = c.rtt + 'ms';
  c.onchange = readNet;
}

// ── ERROR ──
function showError(msg) {
  const s = document.getElementById('errScreen');
  document.getElementById('errMsg').innerHTML = msg;
  s.classList.add('show');
}

// ── INIT ──
window.addEventListener('load', () => {
  readNet();
  boot();
});
</script>
