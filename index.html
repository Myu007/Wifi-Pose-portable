<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>InvisPose</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap');

:root {
–accent: #00ffc8;
–accent2: #00b8ff;
–red: #ff3d5a;
–gold: #ffc844;
–bg-hud: rgba(0,10,15,0.72);
–border: rgba(0,255,200,0.25);
–mono: ‘Share Tech Mono’, monospace;
–display: ‘Orbitron’, sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
width: 100%; height: 100%;
overflow: hidden;
position: fixed;
background: #000;
-webkit-tap-highlight-color: transparent;
touch-action: none;
}

#video {
position: fixed;
inset: 0;
width: 100%; height: 100%;
object-fit: cover;
z-index: 0;
}
#video.mirror { transform: scaleX(-1); }

#canvas {
position: fixed;
inset: 0;
width: 100%; height: 100%;
z-index: 1;
pointer-events: none;
}

/* TOP BAR */
.hud-top {
position: fixed;
top: 0; left: 0; right: 0;
z-index: 10;
padding: env(safe-area-inset-top, 10px) 14px 10px;
background: linear-gradient(to bottom, rgba(0,0,0,0.75) 0%, transparent 100%);
display: flex;
align-items: center;
justify-content: space-between;
gap: 8px;
}

.logo {
display: flex;
align-items: center;
gap: 8px;
flex-shrink: 0;
}

.logo-mark {
width: 26px; height: 26px;
border: 1.5px solid var(–accent);
border-radius: 50%;
display: flex; align-items: center; justify-content: center;
box-shadow: 0 0 10px rgba(0,255,200,0.4);
position: relative;
}
.logo-mark::after {
content: ‘’;
position: absolute;
inset: 4px;
border-radius: 50%;
background: var(–accent);
opacity: 0.7;
animation: corePulse 2s ease-in-out infinite;
}
@keyframes corePulse { 0%,100%{opacity:.3} 50%{opacity:.9} }

.logo-text {
font-family: var(–display);
font-size: 12px;
font-weight: 700;
letter-spacing: 3px;
color: var(–accent);
text-shadow: 0 0 14px rgba(0,255,200,0.6);
}

.pills {
display: flex;
align-items: center;
gap: 5px;
flex-wrap: wrap;
justify-content: flex-end;
}

.pill {
display: flex;
align-items: center;
gap: 4px;
padding: 3px 7px;
background: var(–bg-hud);
border: 1px solid var(–border);
border-radius: 2px;
font-family: var(–mono);
font-size: 10px;
letter-spacing: 0.5px;
backdrop-filter: blur(8px);
-webkit-backdrop-filter: blur(8px);
white-space: nowrap;
}
.pill-live { color: var(–accent); }
.pill-dim  { color: rgba(0,255,200,0.45); }

.dot {
width: 5px; height: 5px;
border-radius: 50%;
background: var(–accent);
box-shadow: 0 0 5px var(–accent);
animation: blink 1.4s ease-in-out infinite;
flex-shrink: 0;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.15} }

/* CORNER BRACKETS */
.br {
position: fixed;
width: 18px; height: 18px;
z-index: 5;
pointer-events: none;
}
.br::before, .br::after {
content: ‘’;
position: absolute;
background: var(–accent);
opacity: 0.6;
}
.br-tl { top: calc(env(safe-area-inset-top,0px) + 54px); left: 10px; }
.br-tl::before { top:0;left:0;width:2px;height:100%; }
.br-tl::after  { top:0;left:0;width:100%;height:2px; }

.br-tr { top: calc(env(safe-area-inset-top,0px) + 54px); right: 10px; }
.br-tr::before { top:0;right:0;width:2px;height:100%; }
.br-tr::after  { top:0;right:0;width:100%;height:2px; }

.br-bl { bottom: calc(env(safe-area-inset-bottom,0px) + 90px); left: 10px; }
.br-bl::before { bottom:0;left:0;width:2px;height:100%; }
.br-bl::after  { bottom:0;left:0;width:100%;height:2px; }

.br-br { bottom: calc(env(safe-area-inset-bottom,0px) + 90px); right: 10px; }
.br-br::before { bottom:0;right:0;width:2px;height:100%; }
.br-br::after  { bottom:0;right:0;width:100%;height:2px; }

/* SCAN LINE */
.scanline {
position: fixed; left:0; right:0;
height: 1.5px;
background: linear-gradient(90deg, transparent, var(–accent2) 30%, var(–accent) 50%, var(–accent2) 70%, transparent);
opacity: 0.3; z-index: 4;
pointer-events: none;
animation: scan 4s linear infinite;
}
@keyframes scan {
0%   { top:5%; opacity:0; }
5%   { opacity:0.3; }
95%  { opacity:0.3; }
100% { top:93%; opacity:0; }
}

/* LEFT SIDEBAR */
.sidebar-left {
position: fixed;
left: 10px;
top: 50%;
transform: translateY(-50%);
z-index: 10;
display: flex;
flex-direction: column;
gap: 6px;
pointer-events: none;
}

.info-block {
background: var(–bg-hud);
border: 1px solid var(–border);
border-radius: 2px;
padding: 5px 7px;
backdrop-filter: blur(8px);
-webkit-backdrop-filter: blur(8px);
}
.ib-label {
font-family: var(–mono);
font-size: 7px;
color: rgba(0,255,200,0.35);
letter-spacing: 1px;
text-transform: uppercase;
}
.ib-val {
font-family: var(–mono);
font-size: 11px;
color: var(–accent2);
margin-top: 1px;
}

.sig-bars {
display: flex; align-items: flex-end;
gap: 2px; height: 12px; margin-top: 2px;
}
.sig-bar {
width: 4px;
background: rgba(0,255,200,0.12);
border-radius: 1px;
transition: background 0.4s;
}
.sig-bar.on { background: var(–accent); box-shadow: 0 0 3px var(–accent); }
.sig-bar:nth-child(1){height:3px}
.sig-bar:nth-child(2){height:6px}
.sig-bar:nth-child(3){height:9px}
.sig-bar:nth-child(4){height:12px}

/* RIGHT SIDEBAR */
.sidebar-right {
position: fixed;
right: 10px;
top: 50%;
transform: translateY(-50%);
z-index: 10;
display: flex;
flex-direction: column;
gap: 6px;
pointer-events: none;
}

.stat-block {
background: var(–bg-hud);
border: 1px solid var(–border);
border-radius: 2px;
padding: 5px 8px;
text-align: right;
backdrop-filter: blur(8px);
-webkit-backdrop-filter: blur(8px);
min-width: 62px;
}
.st-label {
font-family: var(–mono);
font-size: 7px;
color: rgba(0,255,200,0.35);
letter-spacing: 1px;
text-transform: uppercase;
}
.st-val {
font-family: var(–display);
font-size: 20px;
font-weight: 700;
color: var(–accent);
line-height: 1.1;
text-shadow: 0 0 10px rgba(0,255,200,0.4);
}
.st-unit {
font-family: var(–mono);
font-size: 7px;
color: rgba(0,255,200,0.4);
}

/* BOTTOM BAR */
.hud-bottom {
position: fixed;
bottom: 0; left: 0; right: 0;
z-index: 10;
padding: 10px 16px calc(env(safe-area-inset-bottom, 10px) + 10px);
background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, transparent 100%);
display: flex;
align-items: center;
justify-content: space-between;
gap: 10px;
}

.btn {
background: var(–bg-hud);
border: 1px solid var(–border);
border-radius: 2px;
padding: 9px 12px;
color: var(–accent);
font-family: var(–mono);
font-size: 10px;
letter-spacing: 1px;
cursor: pointer;
backdrop-filter: blur(8px);
-webkit-backdrop-filter: blur(8px);
touch-action: manipulation;
transition: background 0.15s;
-webkit-user-select: none; user-select: none;
display: flex; align-items: center; gap: 5px;
white-space: nowrap;
}
.btn:active { background: rgba(0,255,200,0.18); }
.btn-icon { font-size: 14px; }

.center-info {
text-align: center;
flex: 1;
pointer-events: none;
}
.big-count {
font-family: var(–display);
font-size: 32px;
font-weight: 900;
color: var(–accent);
text-shadow: 0 0 20px rgba(0,255,200,0.5);
line-height: 1;
}
.big-label {
font-family: var(–mono);
font-size: 8px;
color: rgba(0,255,200,0.45);
letter-spacing: 2px;
margin-top: 2px;
}

/* PERMISSION SCREEN */
#permScreen {
position: fixed; inset: 0;
z-index: 100;
background: #000;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
gap: 20px;
transition: opacity 0.4s;
}
#permScreen.fade { opacity: 0; pointer-events: none; }

.p-logo {
font-family: var(–display);
font-size: 24px;
font-weight: 900;
letter-spacing: 6px;
color: var(–accent);
text-shadow: 0 0 30px rgba(0,255,200,0.4);
}
.p-sub {
font-family: var(–mono);
font-size: 10px;
color: rgba(0,255,200,0.35);
letter-spacing: 3px;
}
.p-track {
width: 200px; height: 2px;
background: rgba(0,255,200,0.1);
overflow: hidden;
}
.p-fill {
height: 100%;
background: linear-gradient(90deg, var(–accent2), var(–accent));
width: 0%; transition: width 0.4s ease;
box-shadow: 0 0 8px var(–accent);
}
.p-msg {
font-family: var(–mono);
font-size: 10px;
color: rgba(200,240,255,0.45);
letter-spacing: 1px;
text-align: center;
line-height: 1.8;
max-width: 220px;
}
.p-btn {
background: transparent;
border: 1px solid var(–accent);
border-radius: 2px;
padding: 12px 30px;
color: var(–accent);
font-family: var(–display);
font-size: 11px;
letter-spacing: 3px;
cursor: pointer;
touch-action: manipulation;
box-shadow: 0 0 16px rgba(0,255,200,0.12);
transition: background 0.2s;
}
.p-btn:active { background: rgba(0,255,200,0.1); }

/* NO CAMERA */
#noCamera {
display: none; position: fixed; inset: 0;
z-index: 50; background: rgba(0,0,0,0.92);
align-items: center; justify-content: center;
font-family: var(–mono); font-size: 12px;
color: rgba(200,240,255,0.5);
text-align: center; padding: 32px; line-height: 2;
}
#noCamera.show { display: flex; }
</style>

</head>
<body>

<!-- Permission screen -->

<div id="permScreen">
  <div class="p-logo">INVISPOSE</div>
  <div class="p-sub">WIFI · DENSEPOSE · AR</div>
  <div class="p-track"><div class="p-fill" id="pFill"></div></div>
  <div class="p-msg" id="pMsg">LOADING POSE ENGINE...<br>PLEASE WAIT</div>
  <button class="p-btn" id="startBtn" style="display:none" onclick="startCamera()">ENABLE CAMERA</button>
</div>

<!-- No camera fallback -->

<div id="noCamera">CAMERA ACCESS REQUIRED<br>ALLOW PERMISSION AND RELOAD<br><br>HTTPS REQUIRED ON MOBILE</div>

<!-- Camera -->

<video id="video" autoplay playsinline muted></video>

<!-- Pose canvas -->

<canvas id="canvas"></canvas>

<!-- Scanline -->

<div class="scanline"></div>

<!-- Corner brackets -->

<div class="br br-tl"></div>
<div class="br br-tr"></div>
<div class="br br-bl"></div>
<div class="br br-br"></div>

<!-- Top HUD -->

<div class="hud-top">
  <div class="logo">
    <div class="logo-mark"></div>
    <div class="logo-text">INVISPOSE</div>
  </div>
  <div class="pills">
    <div class="pill"><div class="dot"></div><span class="pill-live" id="fpsVal">--</span><span class="pill-dim">FPS</span></div>
    <div class="pill"><span class="pill-live" id="confVal">--</span><span class="pill-dim">CONF</span></div>
    <div class="pill"><span class="pill-live" id="connType">WIFI</span></div>
  </div>
</div>

<!-- Left sidebar -->

<div class="sidebar-left">
  <div class="info-block">
    <div class="ib-label">SIGNAL</div>
    <div class="sig-bars" id="sigBars">
      <div class="sig-bar on"></div>
      <div class="sig-bar on"></div>
      <div class="sig-bar on"></div>
      <div class="sig-bar"></div>
    </div>
  </div>
  <div class="info-block">
    <div class="ib-label">SPEED</div>
    <div class="ib-val" id="dlVal">—</div>
  </div>
  <div class="info-block">
    <div class="ib-label">RTT</div>
    <div class="ib-val" id="rttVal">—</div>
  </div>
  <div class="info-block">
    <div class="ib-label">MODE</div>
    <div class="ib-val" id="modeVal">REAR</div>
  </div>
</div>

<!-- Right sidebar -->

<div class="sidebar-right">
  <div class="stat-block">
    <div class="st-label">PERSONS</div>
    <div class="st-val" id="personStat">0</div>
  </div>
  <div class="stat-block">
    <div class="st-label">KEYPTS</div>
    <div class="st-val" id="kpStat">0</div>
  </div>
  <div class="stat-block">
    <div class="st-label">LAT</div>
    <div class="st-val" id="latStat">--</div>
    <div class="st-unit">ms</div>
  </div>
</div>

<!-- Bottom bar -->

<div class="hud-bottom">
  <button class="btn" onclick="flipCamera()">
    <span class="btn-icon">🔄</span><span>FLIP</span>
  </button>
  <div class="center-info">
    <div class="big-count" id="personCount">0</div>
    <div class="big-label">DETECTED</div>
  </div>
  <button class="btn" onclick="toggleFX()">
    <span class="btn-icon">✦</span><span id="fxLabel">FX ON</span>
  </button>
</div>

<!-- Scripts -->

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>

<script>
// ── POSE CONNECTIONS (MediaPipe 33-landmark model) ──
const CONNECTIONS = [
  [0,1],[1,2],[2,3],[3,7],[0,4],[4,5],[5,6],[6,8],[9,10],
  [11,12],[11,13],[13,15],[15,17],[15,19],[17,19],
  [12,14],[14,16],[16,18],[16,20],[18,20],
  [11,23],[12,24],[23,24],
  [23,25],[25,27],[27,29],[27,31],[29,31],
  [24,26],[26,28],[28,30],[28,32],[30,32]
];

function segColor(a, b) {
  if (a <= 10 || b <= 10) return '#00ffc8';
  if ((a>=11&&a<=22)||(b>=11&&b<=22)) {
    if ((a<=12||b<=12)||(a==23||b==23)||(a==24||b==24)) return '#ffc844';
    return '#00b8ff';
  }
  return '#ff6ec4';
}

// ── STATE ──
const video  = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx    = canvas.getContext('2d');

let facingMode = 'environment';
let isMirror   = false;
let fxOn       = true;
let frameCount = 0, lastFPSt = Date.now(), fps = 0;
let mpPose, mpCamera, stream;
let frameStart = 0;

// ── BOOT ──
const bootSteps = [
  [0,  'LOADING POSE ENGINE...'],
  [25, 'COMPILING WASM...'],
  [55, 'PREPARING NEURAL NET...'],
  [80, 'READY'],
];
let bi = 0;
function boot() {
  if (bi >= bootSteps.length) {
    document.getElementById('pFill').style.width = '80%';
    document.getElementById('pMsg').textContent = 'READY · TAP TO BEGIN';
    document.getElementById('startBtn').style.display = 'block';
    return;
  }
  const [p, m] = bootSteps[bi++];
  document.getElementById('pFill').style.width = p + '%';
  document.getElementById('pMsg').textContent = m;
  setTimeout(boot, 420 + Math.random()*300);
}
window.addEventListener('load', () => setTimeout(boot, 200));

// ── RESIZE ──
function resize() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);
window.addEventListener('orientationchange', () => setTimeout(resize, 100));

// ── MEDIAPIPE INIT ──
function initPose() {
  mpPose = new Pose({
    locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${f}`
  });
  mpPose.setOptions({
    modelComplexity: 1,
    smoothLandmarks: true,
    enableSegmentation: false,
    minDetectionConfidence: 0.5,
    minTrackingConfidence: 0.5
  });
  mpPose.onResults(onResults);
}

// ── START CAMERA ──
async function startCamera() {
  document.getElementById('startBtn').style.display = 'none';
  document.getElementById('pMsg').textContent = 'REQUESTING CAMERA...';
  document.getElementById('pFill').style.width = '90%';

  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: facingMode }, width:{ideal:1280}, height:{ideal:720} },
      audio: false
    });
    video.srcObject = stream;

    await new Promise(r => { video.onloadedmetadata = r; });

    document.getElementById('pFill').style.width = '100%';
    document.getElementById('pMsg').textContent = 'STARTING AI...';

    initPose();

    mpCamera = new Camera(video, {
      onFrame: async () => { if (mpPose) { frameStart = Date.now(); await mpPose.send({ image: video }); } },
      width: 1280, height: 720
    });

    await mpCamera.start();

    const ps = document.getElementById('permScreen');
    ps.classList.add('fade');
    setTimeout(() => { ps.style.display = 'none'; }, 400);

    readNetworkInfo();

  } catch(e) {
    console.error(e);
    document.getElementById('noCamera').classList.add('show');
    document.getElementById('permScreen').style.display = 'none';
  }
}

// ── POSE RESULTS ──
function onResults(results) {
  const W = canvas.width, H = canvas.height;
  const now = Date.now();
  const latency = now - frameStart;

  // FPS counter
  frameCount++;
  if (now - lastFPSt >= 1000) {
    fps = Math.round(frameCount * 1000 / (now - lastFPSt));
    frameCount = 0; lastFPSt = now;
    document.getElementById('fpsVal').textContent = fps;
  }

  ctx.save();
  ctx.clearRect(0, 0, W, H);

  if (isMirror) { ctx.scale(-1,1); ctx.translate(-W,0); }

  // Vignette
  if (fxOn) {
    const v = ctx.createRadialGradient(W/2,H/2,H*0.25,W/2,H/2,H*0.8);
    v.addColorStop(0,'transparent');
    v.addColorStop(1,'rgba(0,4,8,0.45)');
    ctx.fillStyle = v; ctx.fillRect(0,0,W,H);
  }

  const lm = results.poseLandmarks;
  let visKP = 0, confSum = 0;

  if (lm && lm.length) {
    // Connections
    ctx.lineCap = 'round';
    for (const [a,b] of CONNECTIONS) {
      const ka = lm[a], kb = lm[b];
      if (!ka||!kb||ka.visibility<0.3||kb.visibility<0.3) continue;
      const ax=ka.x*W, ay=ka.y*H, bx=kb.x*W, by=kb.y*H;
      const col = segColor(a,b);
      const vis = (ka.visibility+kb.visibility)/2;

      if (fxOn) {
        ctx.beginPath(); ctx.moveTo(ax,ay); ctx.lineTo(bx,by);
        ctx.strokeStyle = col+'28'; ctx.lineWidth = 12; ctx.stroke();
      }

      const g = ctx.createLinearGradient(ax,ay,bx,by);
      const alpha = Math.round(vis*210).toString(16).padStart(2,'0');
      g.addColorStop(0, col+alpha);
      g.addColorStop(1, col+Math.round(vis*140).toString(16).padStart(2,'0'));
      ctx.beginPath(); ctx.moveTo(ax,ay); ctx.lineTo(bx,by);
      ctx.strokeStyle = g; ctx.lineWidth = 3; ctx.stroke();
    }

    // Keypoints
    for (let i=0; i<lm.length; i++) {
      const k = lm[i];
      if (k.visibility < 0.3) continue;
      visKP++; confSum += k.visibility;
      const px=k.x*W, py=k.y*H;
      const col = segColor(i,i);
      const r = i < 11 ? 4 : 5;

      if (fxOn) {
        ctx.beginPath(); ctx.arc(px,py,r+6,0,Math.PI*2);
        ctx.fillStyle=col+'18'; ctx.fill();
      }
      ctx.beginPath(); ctx.arc(px,py,r,0,Math.PI*2);
      ctx.fillStyle = col;
      if(fxOn){ctx.shadowColor=col;ctx.shadowBlur=8;}
      ctx.fill();
      ctx.shadowBlur=0;
    }

    // Label above head (landmark 0 = nose)
    const nose = lm[0];
    if (nose && nose.visibility > 0.4) {
      const tx = nose.x*W, ty = nose.y*H - 22;
      const conf = visKP ? Math.round(confSum/visKP*100) : 0;
      const label = `PERSON · ${conf}%`;
      const lw = label.length * 6.2;

      ctx.fillStyle = 'rgba(0,10,15,0.75)';
      ctx.fillRect(tx-lw/2-6, ty-15, lw+12, 16);
      ctx.strokeStyle = 'rgba(0,255,200,0.55)'; ctx.lineWidth=0.8;
      ctx.strokeRect(tx-lw/2-6, ty-15, lw+12, 16);
      ctx.fillStyle='#00ffc8';
      ctx.font='10px "Share Tech Mono"';
      ctx.textAlign='center';
      ctx.fillText(label, tx, ty-2);
      ctx.textAlign='left';
    }

    // Bounding dashes
    const xs = lm.filter(k=>k.visibility>0.5).map(k=>k.x*W);
    const ys = lm.filter(k=>k.visibility>0.5).map(k=>k.y*H);
    if (xs.length > 4) {
      const minX=Math.min(...xs)-12, maxX=Math.max(...xs)+12;
      const minY=Math.min(...ys)-12, maxY=Math.max(...ys)+12;
      ctx.strokeStyle='rgba(0,255,200,0.18)';
      ctx.lineWidth=1; ctx.setLineDash([5,4]);
      ctx.strokeRect(minX,minY,maxX-minX,maxY-minY);
      ctx.setLineDash([]);
    }

    // Update HUD
    const conf2 = visKP ? Math.round(confSum/visKP*100)+'%' : '--';
    document.getElementById('personCount').textContent = '1';
    document.getElementById('personStat').textContent  = '1';
    document.getElementById('confVal').textContent     = conf2;
    document.getElementById('kpStat').textContent      = visKP;
    document.getElementById('latStat').textContent     = latency;

  } else {
    // No pose — searching pulse
    if (fxOn) {
      const cx=W/2, cy=H/2;
      const t = Date.now()/500;
      for (let i=0;i<3;i++) {
        const r = 30 + i*25 + Math.sin(t+i)*8;
        ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2);
        ctx.strokeStyle=`rgba(0,255,200,${0.06-i*0.015})`;
        ctx.lineWidth=1.5; ctx.stroke();
      }
    }
    document.getElementById('personCount').textContent = '0';
    document.getElementById('personStat').textContent  = '0';
    document.getElementById('confVal').textContent     = '--';
    document.getElementById('kpStat').textContent      = '0';
    document.getElementById('latStat').textContent     = latency;
  }

  ctx.restore();
}

// ── CONTROLS ──
async function flipCamera() {
  facingMode = facingMode==='environment' ? 'user' : 'environment';
  isMirror   = facingMode==='user';
  video.classList.toggle('mirror', isMirror);
  document.getElementById('modeVal').textContent = isMirror ? 'FRONT' : 'REAR';

  if (mpCamera) mpCamera.stop();
  if (stream) stream.getTracks().forEach(t=>t.stop());

  stream = await navigator.mediaDevices.getUserMedia({
    video:{ facingMode:{ideal:facingMode}, width:{ideal:1280}, height:{ideal:720} }, audio:false
  });
  video.srcObject = stream;

  mpCamera = new Camera(video, {
    onFrame: async()=>{ if(mpPose){ frameStart=Date.now(); await mpPose.send({image:video}); } },
    width:1280, height:720
  });
  mpCamera.start();
}

function toggleFX() {
  fxOn = !fxOn;
  document.getElementById('fxLabel').textContent = fxOn ? 'FX ON' : 'FX OFF';
}

// ── NETWORK INFO ──
function readNetworkInfo() {
  const c = navigator.connection||navigator.mozConnection||navigator.webkitConnection;
  if (!c) return;
  const type = c.effectiveType||c.type||'wifi';
  document.getElementById('connType').textContent = type.toUpperCase();
  if (c.downlink) {
    document.getElementById('dlVal').textContent = c.downlink.toFixed(1)+'Mb';
    const lv = Math.min(4,Math.ceil(c.downlink/15));
    document.querySelectorAll('.sig-bar').forEach((b,i)=>b.classList.toggle('on',i<lv));
  }
  if (c.rtt) document.getElementById('rttVal').textContent = c.rtt+'ms';
  c.addEventListener('change', readNetworkInfo);
}
</script>
